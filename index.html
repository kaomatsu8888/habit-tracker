<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学習トラッカー</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <link rel="stylesheet" href="styles.css">

  <!--
    @security EmailJS SDK
    Public Key・Service ID・Template ID をクライアントサイドで直接使用しているが、
    EmailJS ダッシュボードの Security 設定にて
    許可ドメインを kaomatsu8888.github.io のみに制限済み。
    そのため、外部ドメインからこのキーを悪用することはできない。
  -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <!-- Chart.js: 週別学習グラフに使用 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

  <!-- SortableJS: カテゴリカードのドラッグ並び替えに使用 -->
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
</head>
<body>

  <!-- 固定ヘッダー（タイトル・月ナビ・サマリー） -->
  <div class="sticky-header-outer">
    <div class="sticky-header-inner">
      <div class="header">
        <h1>📚 学習トラッカー</h1>
        <div class="header-right">
          <span class="save-indicator" id="save-indicator">
            <i class="ti ti-device-floppy"></i> 自動保存
          </span>
          <div class="month-nav">
            <button id="prev-month" aria-label="前の月"><i class="ti ti-chevron-left"></i></button>
            <span id="month-label"></span>
            <button id="next-month" aria-label="次の月"><i class="ti ti-chevron-right"></i></button>
          </div>
        </div>
      </div>
      <div class="summary-row">
        <div class="summary-card">
          <div class="slabel">今月の達成日</div>
          <div class="svalue" id="stat-days">-</div>
        </div>
        <div class="summary-card">
          <div class="slabel">解放済みカテゴリ</div>
          <div class="svalue" id="stat-unlocked">-</div>
        </div>
        <div class="summary-card">
          <div class="slabel">今月の総学習時間</div>
          <div class="svalue" id="stat-time">-</div>
        </div>
      </div>
      <p class="storage-note">
        <i class="ti ti-info-circle"></i> データはこのブラウザ・端末のみに保存されます。別の端末やブラウザでは共有されません。
      </p>
    </div>
  </div>

  <!-- スクロール領域 -->
  <div class="container">
    <div class="scroll-body confetti-wrap">

      <!-- 週別学習グラフ（アコーディオン） -->
      <div class="accordion" id="chart-accordion">
        <div class="acc-header" id="acc-toggle" role="button" tabindex="0" aria-expanded="false" aria-controls="acc-body">
          <div class="acc-title">
            <i class="ti ti-chart-bar" aria-hidden="true"></i>
            週別学習グラフ
          </div>
          <i class="ti ti-chevron-down acc-icon" id="acc-icon" aria-hidden="true"></i>
        </div>
        <div id="acc-body" class="acc-body" hidden>
          <div class="chart-legend" id="chart-legend"></div>
          <div class="chart-wrap">
            <canvas id="weekChart" role="img" aria-label="過去8週間のカテゴリ別学習達成日数の積み上げ棒グラフ">週ごとのカテゴリ別学習達成日数。</canvas>
          </div>
        </div>
      </div>

      <!-- カテゴリカードのリスト（SortableJS対象） -->
      <div class="categories" id="cat-list"></div>

      <!-- メールアドレス入力（30日達成通知用） -->
      <div class="email-row">
        <i class="ti ti-mail"></i>
        <input id="email-input" type="email" placeholder="30日達成通知用メールアドレス（任意）"
          oninput="state.email=this.value;saveState();">
      </div>

      <!-- カテゴリ追加フォーム -->
      <div class="add-row">
        <input id="new-cat" placeholder="新しいカテゴリ（例: 数学）" maxlength="20" aria-label="新しいカテゴリ名">
        <button id="add-btn"><i class="ti ti-plus"></i> 追加</button>
      </div>

      <!-- データ管理（エクスポート・インポート・リセット） -->
      <div class="data-zone">
        <div class="data-zone-left">
          <button class="data-btn" id="export-btn">
            <i class="ti ti-download"></i> エクスポート
          </button>
          <button class="data-btn" id="import-btn">
            <i class="ti ti-upload"></i> インポート
          </button>
          <input type="file" id="import-input" accept=".json" style="display:none;">
        </div>
        <button class="reset-btn" id="reset-btn">
          <i class="ti ti-trash"></i> リセット
        </button>
      </div>

    </div>
  </div>

  <script>
    /**
     * @config EmailJS
     * Public Key はクライアントサイドで公開されるが、
     * EmailJS ダッシュボードにて許可ドメインを
     * kaomatsu8888.github.io のみに制限しているため
     * 外部からの悪用リスクはない。
     */
    emailjs.init('0eJgGaSI3oSroJt0r');

    const EMAILJS_SERVICE_ID  = 'service_qd0jgt4';
    const EMAILJS_TEMPLATE_ID = 'template_v8vdw6n';

    /* =====================
       定数・設定
    ===================== */
    const DAYS_JP = ['日','月','火','水','木','金','土'];
    const COLORS = [
      { done: '#534AB7', light: '#EEEDFE', text: '#3C3489' },
      { done: '#0F6E56', light: '#E1F5EE', text: '#085041' },
      { done: '#D85A30', light: '#FAECE7', text: '#993C1D' },
      { done: '#185FA5', light: '#E6F1FB', text: '#0C447C' },
      { done: '#BA7517', light: '#FAEEDA', text: '#854F0B' },
      { done: '#993556', light: '#FBEAF0', text: '#72243E' },
    ];
    const ICONS = ['ti-code','ti-language','ti-book','ti-pencil','ti-music','ti-calculator','ti-chart-bar','ti-brain','ti-device-desktop','ti-palette'];
    const THRESHOLD   = 30;
    const STORAGE_KEY = 'habit_tracker_v1';

    const defaultCats = [
      { id: 'exercise',     name: '運動',           icon: 'ti-run' },
      { id: 'prog',         name: 'プログラミング', icon: 'ti-code' },
      { id: 'meditation',   name: '瞑想',           icon: 'ti-brain' },
      { id: 'entrepreneur', name: '起業調査・行動', icon: 'ti-rocket' },
    ];

    /* =====================
       状態管理
    ===================== */

    /**
     * localStorageから状態を読み込む。
     * @returns {object} アプリの状態
     */
    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          const saved = JSON.parse(raw);
          return {
            categories: saved.categories || [...defaultCats],
            logs:        saved.logs      || {},
            minutes:     saved.minutes   || {},
            email:       saved.email     || '',
            viewYear:  new Date().getFullYear(),
            viewMonth: new Date().getMonth(),
          };
        }
      } catch(e) {}
      return {
        categories: [...defaultCats],
        logs: {}, minutes: {}, email: '',
        viewYear:  new Date().getFullYear(),
        viewMonth: new Date().getMonth(),
      };
    }

    /**
     * 現在の状態をlocalStorageに保存する。
     */
    function saveState() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          categories: state.categories,
          logs:       state.logs,
          minutes:    state.minutes,
          email:      state.email,
        }));
        flashSave();
      } catch(e) {}
    }

    /** 自動保存インジケーターを一瞬緑にする */
    function flashSave() {
      const el = document.getElementById('save-indicator');
      if (!el) return;
      el.style.color = '#0f6e56';
      setTimeout(() => { el.style.color = ''; }, 1200);
    }

    let state = loadState();

    /* =====================
       ユーティリティ
    ===================== */

    /** ログのキーを生成する */
    function dkey(c, y, m, d) { return `${c}_${y}_${m}_${d}`; }

    /** 学習時間のキーを生成する */
    function mkey(c, y, m, d) { return `min_${c}_${y}_${m}_${d}`; }

    /** 今日の日付を返す */
    function today() {
      const n = new Date();
      return { y: n.getFullYear(), m: n.getMonth(), d: n.getDate() };
    }

    /** 指定月の日数を返す */
    function daysInMonth(y, m) { return new Date(y, m + 1, 0).getDate(); }

    /** 指定月の初日の曜日を返す（0=日曜） */
    function firstDay(y, m) { return new Date(y, m, 1).getDay(); }

    /* =====================
       エクスポート・インポート
    ===================== */

    /**
     * 現在の全データをJSONファイルとしてダウンロードする。
     */
    function exportData() {
      const payload = {
        version:    1,
        exportedAt: new Date().toISOString(),
        categories: state.categories,
        logs:       state.logs,
        minutes:    state.minutes,
        email:      state.email,
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      const date = new Date().toISOString().slice(0, 10);
      a.href     = url;
      a.download = `habit-tracker-${date}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    /**
     * JSONファイルを読み込んでデータを復元する。
     * @param {File} file 読み込むJSONファイル
     */
    function importData(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const parsed = JSON.parse(e.target.result);
          if (!parsed.categories || !parsed.logs) {
            alert('ファイルの形式が正しくありません。');
            return;
          }
          if (!confirm('現在のデータをインポートしたデータで上書きしますか？')) return;
          state = {
            categories: parsed.categories || [...defaultCats],
            logs:        parsed.logs      || {},
            minutes:     parsed.minutes   || {},
            email:       parsed.email     || '',
            viewYear:  new Date().getFullYear(),
            viewMonth: new Date().getMonth(),
          };
          saveState();
          if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
          render();
          initSortable();
          updateChart();
          alert('インポートが完了しました！');
        } catch(err) {
          alert('ファイルの読み込みに失敗しました。正しいJSONファイルか確認してください。');
        }
      };
      reader.readAsText(file);
    }

    /* =====================
       ロジック
    ===================== */

    /**
     * 指定カテゴリの現在の連続日数を計算する。
     * @param {string} catId
     * @returns {number} 連続日数
     */
    function calcStreak(catId) {
      const t = today();
      const d = new Date(t.y, t.m, t.d);
      let streak = 0;
      for (let i = 0; i < 400; i++) {
        if (state.logs[dkey(catId, d.getFullYear(), d.getMonth(), d.getDate())]) {
          streak++; d.setDate(d.getDate() - 1);
        } else break;
      }
      return streak;
    }

    /**
     * 指定カテゴリが30日達成済みか判定する。
     * @param {string} catId
     * @returns {boolean}
     */
    function isUnlocked(catId) { return calcStreak(catId) >= THRESHOLD; }

    /**
     * 日付セルをトグルする。
     * @param {string} catId
     * @param {number} y
     * @param {number} m
     * @param {number} d
     */
    function toggle(catId, y, m, d) {
      const cat         = state.categories.find(c => c.id === catId);
      const k           = dkey(catId, y, m, d);
      const wasUnlocked = isUnlocked(catId);
      state.logs[k]     = !state.logs[k];
      const nowUnlocked = isUnlocked(catId);
      if (!wasUnlocked && nowUnlocked) {
        triggerConfetti(catId);
        sendUnlockEmail(cat);
      }
      saveState();
      render();
      updateChart();
    }

    /**
     * 30日達成時にEmailJSでメール通知を送信する。
     * @param {object} cat カテゴリオブジェクト
     */
    function sendUnlockEmail(cat) {
      if (!state.email) return;
      emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
        category_name: cat.name,
        email:         state.email,
        name:          'Kaoru',
      }).catch(err => console.error('EmailJS error:', err));
    }

    /**
     * 学習時間を記録する。
     * @param {string} catId
     * @param {number} y
     * @param {number} m
     * @param {number} d
     * @param {string} val 入力値（分）
     */
    function setMinutes(catId, y, m, d, val) {
      const mk = mkey(catId, y, m, d);
      const n  = parseInt(val, 10);
      if (!isNaN(n) && n >= 0) state.minutes[mk] = n;
      else delete state.minutes[mk];
      saveState();
      renderStats();
    }

    /**
     * 30日達成時のコンフェッティエフェクトを発火する。
     * @param {string} catId
     */
    function triggerConfetti(catId) {
      const card     = document.querySelector(`[data-catid="${catId}"]`);
      const wrap     = document.querySelector('.confetti-wrap');
      if (!wrap) return;
      const wrapRect = wrap.getBoundingClientRect();
      const rect     = card ? card.getBoundingClientRect() : null;
      const cx       = rect ? rect.left - wrapRect.left + rect.width / 2 : 200;
      const cy       = rect ? rect.top  - wrapRect.top  + 40             : 80;
      for (let i = 0; i < 60; i++) {
        const el     = document.createElement('div');
        const colors = ['#534AB7','#0F6E56','#D85A30','#185FA5','#BA7517','#993556'];
        el.style.cssText = `position:absolute;width:7px;height:7px;background:${colors[i % colors.length]};border-radius:2px;left:${cx}px;top:${cy}px;opacity:1;pointer-events:none;z-index:999;transition:transform 1.6s ease-out,opacity 1.6s;`;
        wrap.appendChild(el);
        const angle = Math.random() * Math.PI * 2;
        const dist  = 80 + Math.random() * 200;
        setTimeout(() => {
          el.style.transform = `translate(${Math.cos(angle) * dist}px,${Math.sin(angle) * dist + 60}px) rotate(${Math.random() * 360}deg)`;
          el.style.opacity   = '0';
        }, 30);
        setTimeout(() => el.remove(), 1700);
      }
    }

    /* =====================
       SortableJS 並び替え
    ===================== */

    let sortableInstance = null;

    /**
     * SortableJSを初期化する。
     * ドラッグ完了後に state.categories の順序を更新して保存する。
     */
    function initSortable() {
      const el = document.getElementById('cat-list');
      if (sortableInstance) sortableInstance.destroy();
      sortableInstance = Sortable.create(el, {
        animation:  200,
        handle:     '.drag-handle',
        ghostClass: 'sortable-ghost',
        onEnd: (evt) => {
          // DOM の並び順に合わせて state.categories を並び替える
          const newOrder = [...el.querySelectorAll('[data-catid]')].map(el => el.dataset.catid);
          state.categories = newOrder.map(id => state.categories.find(c => c.id === id)).filter(Boolean);
          saveState();
          // 色の再割り当てのため再描画
          render();
          updateChart();
        },
      });
    }

    /* =====================
       週別グラフ
    ===================== */

    let chartInstance = null;

    /**
     * 過去8週分のラベルと、カテゴリごとの達成日数データを生成する。
     * @returns {{ labels: string[], datasets: object[] }}
     */
    function buildChartData() {
      const t    = today();
      const base = new Date(t.y, t.m, t.d);
      const dow  = (base.getDay() + 6) % 7;
      const mon  = new Date(base); mon.setDate(base.getDate() - dow);

      const labels     = [];
      const weekStarts = [];
      for (let w = 7; w >= 0; w--) {
        const ws = new Date(mon); ws.setDate(mon.getDate() - w * 7);
        weekStarts.push(new Date(ws));
        if (w === 0)      labels.push('今週');
        else if (w === 1) labels.push('先週');
        else              labels.push(`${w}週前`);
      }

      const datasets = state.categories.map((cat, idx) => {
        const c    = COLORS[idx % COLORS.length];
        const data = weekStarts.map(ws => {
          let count = 0;
          for (let d = 0; d < 7; d++) {
            const day = new Date(ws); day.setDate(ws.getDate() + d);
            if (day > base) break;
            const k = dkey(cat.id, day.getFullYear(), day.getMonth(), day.getDate());
            if (state.logs[k]) count++;
          }
          return count;
        });
        return {
          label:           cat.name,
          data,
          backgroundColor: c.done,
          borderRadius:    3,
          borderSkipped:   false,
        };
      });

      return { labels, datasets };
    }

    /** グラフの凡例HTMLを生成して描画する */
    function renderLegend() {
      const el = document.getElementById('chart-legend');
      if (!el) return;
      el.innerHTML = state.categories.map((cat, idx) => {
        const c = COLORS[idx % COLORS.length];
        return `<span class="leg-item"><span class="leg-dot" style="background:${c.done};"></span>${cat.name}</span>`;
      }).join('');
    }

    /** グラフを新規作成 or データ更新する */
    function updateChart() {
      const body = document.getElementById('acc-body');
      if (!body || body.hidden) return;
      const { labels, datasets } = buildChartData();
      if (chartInstance) {
        chartInstance.data.labels   = labels;
        chartInstance.data.datasets = datasets;
        chartInstance.update();
        renderLegend();
        return;
      }
      renderLegend();
      chartInstance = new Chart(document.getElementById('weekChart'), {
        type: 'bar',
        data: { labels, datasets },
        options: {
          responsive:          true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                title: t => t[0].label,
                label: c => `${c.dataset.label}: ${c.raw}日`,
              },
            },
          },
          scales: {
            x: {
              stacked: true,
              grid:    { display: false },
              ticks:   { font: { size: 11 }, color: '#9f9f97', autoSkip: false, maxRotation: 0 },
            },
            y: {
              stacked: true,
              min:     0,
              grid:    { color: 'rgba(128,128,128,0.1)' },
              ticks:   { font: { size: 11 }, color: '#9f9f97', stepSize: 1, precision: 0 },
            },
          },
        },
      });
    }

    /** アコーディオンの開閉を切り替える */
    function toggleAccordion() {
      const body   = document.getElementById('acc-body');
      const icon   = document.getElementById('acc-icon');
      const toggle = document.getElementById('acc-toggle');
      const isOpen = !body.hidden;
      body.hidden  = isOpen;
      icon.classList.toggle('open', !isOpen);
      toggle.setAttribute('aria-expanded', String(!isOpen));
      if (!isOpen) updateChart();
    }

    /* =====================
       レンダリング
    ===================== */

    /**
     * カテゴリカードのHTMLを生成して返す。
     * @param {object} cat
     * @param {number} idx
     * @returns {string}
     */
    function renderCat(cat, idx) {
      const c          = COLORS[idx % COLORS.length];
      const { viewYear: vy, viewMonth: vm } = state;
      const t          = today();
      const dim        = daysInMonth(vy, vm);
      const fd         = firstDay(vy, vm);
      const isCurMonth = (vy === t.y && vm === t.m);
      const streak     = calcStreak(cat.id);
      const unlocked   = isUnlocked(cat.id);
      const pct        = Math.min(100, Math.round(streak / THRESHOLD * 100));
      const remaining  = Math.max(0, THRESHOLD - streak);
      const deletable  = !defaultCats.find(dc => dc.id === cat.id);

      let cells = '';
      for (let i = 0; i < fd; i++) cells += `<div class="day-cell empty"></div>`;
      for (let d = 1; d <= dim; d++) {
        const k        = dkey(cat.id, vy, vm, d);
        const done     = !!state.logs[k];
        const isFuture = isCurMonth && d > t.d;
        const isToday  = isCurMonth && d === t.d;
        const cls      = 'day-cell' + (done ? ' done' : '') + (isToday ? ' today' : '') + (isFuture ? ' future' : '');
        const style    = done ? `background:${c.done};` : '';
        const oc       = isFuture ? '' : `onclick="toggle('${cat.id}',${vy},${vm},${d})"`;
        cells += `<div class="${cls}" style="${style}" ${oc} title="${d}日">
          ${done ? `<i class="ti ti-check" style="font-size:12px;color:#fff;"></i>` : d}
        </div>`;
      }

      const progressHtml = !unlocked ? `
        <div class="progress-bar-wrap">
          <div class="progress-meta">
            <span>30日チャレンジ</span>
            <span>${streak} / ${THRESHOLD}日 — あと${remaining}日</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill" style="width:${pct}%;background:${c.done};"></div>
          </div>
        </div>` : `
        <div class="unlock-flash" style="background:${c.light};color:${c.text};">
          <i class="ti ti-lock-open"></i> 時間記録が解放されています — 継続中 ${streak}日
        </div>`;

      let timeHtml = '';
      if (unlocked) {
        const bars = [];
        for (let d = 1; d <= dim; d++) {
          bars.push({ d, min: state.minutes[mkey(cat.id, vy, vm, d)] || 0, done: !!state.logs[dkey(cat.id, vy, vm, d)] });
        }
        const maxMin   = Math.max(1, ...bars.map(b => b.min));
        const barHtml  = bars.map(b => {
          const h = b.min > 0 ? Math.max(4, Math.round(b.min / maxMin * 48)) : 2;
          return `<div class="bar-wrap">
            <div class="bar" style="height:${h}px;background:${b.min > 0 ? c.done : 'var(--bg-secondary)'};" title="${b.d}日: ${b.min}分"></div>
            <div class="bar-dlabel">${b.d % 7 === 0 ? b.d : ''}</div>
          </div>`;
        }).join('');
        const totalMin = bars.reduce((s, b) => s + b.min, 0);
        const h        = Math.floor(totalMin / 60);
        const m        = totalMin % 60;
        const todayMin = isCurMonth ? (state.minutes[mkey(cat.id, vy, vm, t.d)] || 0) : 0;

        timeHtml = `
        <div class="time-section">
          <span class="ts-label">今日の学習時間</span>
          <div class="time-input-row">
            <input type="number" min="0" max="999" placeholder="0"
              value="${isCurMonth ? (todayMin || '') : ''}"
              onchange="setMinutes('${cat.id}',${vy},${vm},${isCurMonth ? t.d : 0},this.value)"
              aria-label="${cat.name}の今日の学習時間（分）">
            <span>分</span>
          </div>
          <div class="total-time">今月合計: <strong>${h > 0 ? h + '時間' : ''} ${m}分</strong></div>
          <div class="bar-chart">${barHtml}</div>
        </div>`;
      } else {
        timeHtml = `<div class="time-section"><div class="locked-msg"><i class="ti ti-lock"></i> 30日連続で時間記録が解放されます</div></div>`;
      }

      return `<div class="cat-card" data-catid="${cat.id}">
        <div class="cat-header">
          <div class="cat-title">
            <!-- ドラッグハンドル -->
            <span class="drag-handle" title="ドラッグして並び替え" aria-label="並び替え">
              <i class="ti ti-grip-vertical" aria-hidden="true"></i>
            </span>
            <i class="ti ${cat.icon}" style="font-size:18px;color:${c.done};"></i>
            ${cat.name}
          </div>
          <div style="display:flex;align-items:center;gap:12px;">
            <div class="streak-badge">継続 <span>${streak}日</span></div>
            ${deletable ? `<button class="delete-btn" onclick="deleteCat('${cat.id}')" aria-label="${cat.name}を削除"><i class="ti ti-trash"></i></button>` : ''}
          </div>
        </div>
        <div class="day-label-row">${DAYS_JP.map(d => `<div class="day-label">${d}</div>`).join('')}</div>
        <div class="day-grid">${cells}</div>
        ${progressHtml}
        ${timeHtml}
      </div>`;
    }

    /** サマリーカードの数値を更新する */
    function renderStats() {
      const { viewYear: vy, viewMonth: vm } = state;
      const t          = today();
      const dim        = daysInMonth(vy, vm);
      const isCurMonth = (vy === t.y && vm === t.m);
      const elapsed    = isCurMonth ? t.d : dim;
      const doneSet    = new Set();
      state.categories.forEach(cat => {
        for (let d = 1; d <= elapsed; d++) {
          if (state.logs[dkey(cat.id, vy, vm, d)]) doneSet.add(d);
        }
      });
      document.getElementById('stat-days').textContent = doneSet.size + '日';
      const unlockedCount = state.categories.filter(c => isUnlocked(c.id)).length;
      document.getElementById('stat-unlocked').textContent = `${unlockedCount} / ${state.categories.length}`;
      let totalMin = 0;
      state.categories.forEach(cat => {
        if (isUnlocked(cat.id)) {
          for (let d = 1; d <= dim; d++) totalMin += (state.minutes[mkey(cat.id, vy, vm, d)] || 0);
        }
      });
      const h = Math.floor(totalMin / 60);
      const m = totalMin % 60;
      document.getElementById('stat-time').textContent = totalMin > 0 ? (h > 0 ? h + 'h ' : '') + m + 'm' : '—';
    }

    /** 画面全体を再描画する */
    function render() {
      const { viewYear: vy, viewMonth: vm } = state;
      document.getElementById('month-label').textContent = `${vy}年${vm + 1}月`;
      document.getElementById('cat-list').innerHTML = state.categories.map((c, i) => renderCat(c, i)).join('');
      renderStats();
      const emailInput = document.getElementById('email-input');
      if (emailInput) emailInput.value = state.email || '';
      // render後にSortableを再初期化（DOM再生成のため）
      initSortable();
    }

    /* =====================
       イベントハンドラ
    ===================== */

    window.toggle     = toggle;
    window.setMinutes = setMinutes;

    document.getElementById('acc-toggle').addEventListener('click', toggleAccordion);
    document.getElementById('acc-toggle').addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleAccordion(); }
    });

    document.getElementById('export-btn').onclick = exportData;

    document.getElementById('import-btn').onclick = () => {
      document.getElementById('import-input').click();
    };

    document.getElementById('import-input').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) importData(file);
      e.target.value = '';
    });

    window.deleteCat = function(id) {
      const cat = state.categories.find(c => c.id === id);
      if (!confirm(`「${cat?.name}」を削除しますか？`)) return;
      state.categories = state.categories.filter(c => c.id !== id);
      saveState();
      render();
      updateChart();
    };

    document.getElementById('prev-month').onclick = () => {
      state.viewMonth--;
      if (state.viewMonth < 0) { state.viewMonth = 11; state.viewYear--; }
      render();
    };

    document.getElementById('next-month').onclick = () => {
      const t = today();
      if (state.viewYear === t.y && state.viewMonth === t.m) return;
      state.viewMonth++;
      if (state.viewMonth > 11) { state.viewMonth = 0; state.viewYear++; }
      render();
    };

    document.getElementById('add-btn').onclick = () => {
      const input = document.getElementById('new-cat');
      const name  = input.value.trim();
      if (!name) return;
      const id   = 'cat_' + Date.now();
      const icon = ICONS[state.categories.length % ICONS.length];
      state.categories.push({ id, name, icon });
      input.value = '';
      saveState();
      render();
      updateChart();
    };

    document.getElementById('new-cat').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('add-btn').click();
    });

    document.getElementById('reset-btn').onclick = () => {
      if (!confirm('全データをリセットしますか？この操作は元に戻せません。')) return;
      localStorage.removeItem(STORAGE_KEY);
      state = {
        categories: [...defaultCats],
        logs: {}, minutes: {}, email: '',
        viewYear:  new Date().getFullYear(),
        viewMonth: new Date().getMonth(),
      };
      if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
      render();
    };

    render();
  </script>
</body>
</html>
